name: mutants

# Mutation testing via cargo-mutants. Runs nightly (and on-demand) to
# track which decisions in the codebase are actually verified by tests
# vs. merely executed. A "surviving" mutant is one the test suite did
# not detect — a place where coverage was theatre.
#
# Status: data-collection only. Survivors do not fail the workflow yet;
# `continue-on-error` keeps the run green so the report uploads. Once
# we have a baseline mutation score, this gate will be promoted to
# block PRs at a chosen survival threshold.
#
# Scope: `hector-core` only for v1 — the algorithmic core is where
# mutation testing produces the most signal. CLI command adapters are
# thin enough that mutations there largely measure clap/anyhow plumbing.

on:
  schedule:
    # Nightly at 06:00 UTC (off-peak for most contributors).
    - cron: "0 6 * * *"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: short

jobs:
  mutants:
    name: cargo-mutants (hector-core)
    runs-on: ubuntu-latest
    timeout-minutes: 240
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: mutants

      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-mutants

      - name: Run cargo-mutants on hector-core
        # `continue-on-error` keeps the workflow green even when mutants
        # survive — for v1 the report is the deliverable, not a pass/fail
        # signal. Promote to a hard gate once we know the baseline.
        continue-on-error: true
        run: |
          cargo mutants \
            --package hector-core \
            --no-shuffle \
            --timeout 120 \
            --jobs 2

      - name: Upload mutants report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mutants-report
          path: mutants.out/
          retention-days: 14
